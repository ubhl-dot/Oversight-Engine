<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oversight Initiative // Utility Provisioning Node</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-matrix: #060913;
            --surface-panel: #0d1527;
            --border-glow: #1e3a8a;
            --text-primary: #f8fafc;
            --text-muted: #64748b;
            --neon-blue: #3b82f6;
            --neon-emerald: #10b981;
            --neon-amber: #f59e0b;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-matrix);
            background-image: 
                linear-gradient(rgba(30, 58, 138, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 58, 138, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .terminal-container {
            background-color: var(--surface-panel);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(30, 58, 138, 0.2);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        .terminal-header {
            background-color: #090d1a;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .terminal-dots { display: flex; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #1e293b; }
        .dot.active { background-color: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }

        .status-badge {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--neon-amber);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-pulse {
            width: 6px;
            height: 6px;
            background-color: var(--neon-amber);
            border-radius: 50%;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px var(--neon-amber); }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .terminal-body { padding: 28px; }
        .brand-title { margin: 0 0 6px 0; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; text-transform: uppercase; }
        .brand-subtitle { margin: 0 0 28px 0; font-size: 12px; color: var(--text-muted); line-height: 1.5; }
        .input-group { margin-bottom: 22px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #1e293b;
            border-radius: 4px;
            background-color: #060913;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus, select:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(59, 130, 246, 0.15); }
        input:disabled, select:disabled { opacity: 0.5; background-color: #090d1a; cursor: not-allowed; }

        .action-btn {
            width: 100%;
            padding: 14px;
            background-color: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .action-btn:hover {
            background-color: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .edit-btn {
            background-color: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-decoration: underline;
            cursor: pointer;
            display: none;
            margin-top: 15px;
            text-align: center;
            width: 100%;
        }

        #payment-wrapper {
            display: none;
            margin-top: 25px;
            border-top: 1px dashed #1e293b;
            padding-top: 25px;
        }
        
        .system-alert {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--neon-emerald);
            color: #a7f3d0;
            padding: 14px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 24px;
            display: none;
            line-height: 1.4;
        }
    </style>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_LIVE_PAYPAL_CLIENT_ID&currency=USD&enable-funding=venmo"></script>
</head>
<body>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
            <div id="status-text" class="status-badge"><div class="status-pulse"></div> Awaiting Input Configuration</div>
        </div>
        
        <div class="terminal-body">
            <h1 class="brand-title">Oversight Initiative</h1>
            <p class="brand-subtitle">General System Utility // License Authorization Portal</p>
            
            <div id="success-alert" class="system-alert">
                ⚡ SECURE CORE TRANSMISSION SUCCESSFUL.<br>
                Fulfillment processed. Check your administration log terminal for your license.
            </div>

            <div class="input-group">
                <label for="discord-id">Discord User ID</label>
                <input type="text" id="discord-id" placeholder="e.g. 1514849579818815508" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label for="tier-select">Select Utility Configuration Matrix</label>
                <select id="tier-select">
                    <option value="Core_Automation_Pack" data-price="10.00">Core Automation Pack ($10 Upfront, $5/m)</option>
                    <option value="Premium_Engagment_Hub" data-price="25.00">Premium Engagment Hub ($25 Upfront, $8/m)</option>
                    <option value="Enterprise_Custom_Framework" data-price="50.00">Enterprise Custom Framework ($50 Upfront, $12/m)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="context-name">Target Server Scope Identity</label>
                <input type="text" id="context-name" placeholder="e.g. Oversight Support Hub" autocomplete="off" required>
            </div>

            <button type="button" id="initialize-btn" class="action-btn" onclick="lockAndLoadForm()">Initialize Gateway Matrix</button>

            <div id="payment-wrapper">
                <label style="text-align: center; margin-bottom: 15px; display: block; color: var(--neon-emerald)">[ Secure Payment Link Generated Below ]</label>
                <div id="paypal-button-container"></div>
                <button type="button" id="edit-btn" class="edit-btn" onclick="unlockForm()">❌ Reset Configuration Parameters</button>
            </div>
        </div>
    </div>

    <script>
        function lockAndLoadForm() {
            const discordId = document.getElementById('discord-id').value.trim();
            const contextName = document.getElementById('context-name').value.trim();

            if (!discordId || !contextName) {
                alert('CRITICAL ABORT: Identity data strings must be filled prior to runtime validation.');
                return;
            }

            document.getElementById('discord-id').disabled = true;
            document.getElementById('tier-select').disabled = true;
            document.getElementById('context-name').disabled = true;
            document.getElementById('initialize-btn').style.display = 'none';

            const statusBox = document.getElementById('status-text');
            statusBox.style.color = "var(--neon-emerald)";
            statusBox.innerHTML = '<div class="status-pulse" style="background-color: var(--neon-emerald)"></div> Security Cleared // Gateway Live';

            document.getElementById('payment-wrapper').style.display = 'block';
        }

        function unlockForm() {
            document.getElementById('discord-id').disabled = false;
            document.getElementById('tier-select').disabled = false;
            document.getElementById('context-name').disabled = false;
            document.getElementById('initialize-btn').style.display = 'block';

            const statusBox = document.getElementById('status-text');
            statusBox.style.color = "var(--neon-amber)";
            statusBox.innerHTML = '<div class="status-pulse"></div> Awaiting Input Configuration';

            document.getElementById('payment-wrapper').style.display = 'none';
        }

        paypal.Buttons({
            style: { layout: 'vertical', color: 'blue', shape: 'rect', label: 'checkout' },
            createOrder: function(data, actions) {
                const discordId = document.getElementById('discord-id').value.trim();
                const contextName = document.getElementById('context-name').value.trim();
                const selectElement = document.getElementById('tier-select');
                const chosenTier = selectElement.value;
                const priceValue = selectElement.options[selectElement.selectedIndex].getAttribute('data-price');

                return actions.order.create({
                    purchase_units: [{
                        amount: { value: priceValue, currency_code: 'USD' },
                        description: `Oversight System Utility - Node: ${chosenTier.replace(/_/g, ' ')}`,
                        custom_id: `${discordId}|${chosenTier}|${contextName}`
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    document.getElementById('success-alert').style.display = 'block';
                    unlockForm();
                    document.getElementById('discord-id').value = '';
                    document.getElementById('context-name').value = '';
                });
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
